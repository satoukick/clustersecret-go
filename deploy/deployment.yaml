apiVersion: apps/v1
kind: Deployment
metadata:
  name: clustersecret-operator
  namespace: clustersecret-operator
  labels:
    app.kubernetes.io/name: clustersecret-operator
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: clustersecret-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clustersecret-operator
    spec:
      serviceAccountName: clustersecret-operator
      containers:
      - name: manager
        # Replace with your own image ref (make docker-build IMG=...).
        image: ghcr.io/satoukick/clustersecret-go:latest
        imagePullPolicy: IfNotPresent
        args:
        - --leader-elect
        - --metrics-bind-address=:8080
        - --health-probe-bind-address=:8081
        ports:
        - name: metrics
          containerPort: 8080
        - name: health
          containerPort: 8081
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
