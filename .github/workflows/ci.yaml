name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Go fmt
      run: go fmt ./... && git diff --exit-code

    - name: Go vet
      run: go vet ./...

    - name: Generate DeepCopy
      run: go run sigs.k8s.io/controller-tools/cmd/controller-gen@latest object paths="./api/v1/"

    - name: Verify generated DeepCopy is up to date
      run: git diff --exit-code -- api/v1/zz_generated.deepcopy.go

    - name: Build
      run: go build ./...

    - name: Test
      run: go test ./...

  docker-build:
    name: Docker build (amd64)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: docker/setup-buildx-action@v3

    - name: Build image (no push)
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64
        build-args: VERSION=ci
        push: false
        load: true
        tags: clustersecret-go:ci
