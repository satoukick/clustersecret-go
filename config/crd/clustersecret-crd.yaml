apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clustersecrets.clustersecret.io
spec:
  group: clustersecret.io
  names:
    kind: ClusterSecret
    plural: clustersecrets
    shortNames:
      - csec
    singular: clustersecret
  scope: Cluster
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - description: Secret Type
          jsonPath: .spec.type
          name: Type
          type: string
        - description: Number of synced namespaces
          jsonPath: .status.syncedNamespaces
          name: Synced
          type: string
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              properties:
                matchNamespace:
                  type: array
                  items:
                    type: string
                  description: Regex patterns for matching namespaces.
                avoidNamespaces:
                  type: array
                  items:
                    type: string
                  description: Regex patterns for excluding namespaces.
                data:
                  type: object
                  additionalProperties:
                    type: string
                  description: Key-value data for the secret.
                valueFrom:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                    keys:
                      type: array
                      items:
                        type: string
                  required:
                    - name
                    - namespace
                  description: Reference to an existing Secret to copy data from.
                type:
                  type: string
                  default: Opaque
                  description: Kubernetes Secret type.
            status:
              type: object
              properties:
                syncedNamespaces:
                  type: array
                  items:
                    type: string
                  description: Namespaces the secret has been synced to.
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
